name: Build Web

on:
  pull_request:
  workflow_dispatch:

jobs:
  build_web:
    name: Build WASM and Web Bundles
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Clone Bronze Monkey
        run: git clone https://github.com/Retouched-Project/bronze-monkey.git ../bronze_monkey

      - name: Build WASM
        run: wasm-pack build --target web --out-dir ${{ github.workspace }}/src/wasm --release
        working-directory: ../bronze_monkey

      - name: Build Web App
        run: |
          npm ci
          npm run build

      - name: Prepare Artifact
        run: |
          mkdir artifact_wrap
          cp -r dist artifact_wrap/

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: artifact_wrap/
